name: Release Build

on:
  push:
    branches:
      - main

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            upx-ucl

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Set build metadata
        id: meta
        run: |
          echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          echo "commit=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build Linux
        run: |
          wails build -platform linux/amd64 -clean \
            -ldflags "-X main.version=${{ steps.meta.outputs.version }} -X main.commit=${{ steps.meta.outputs.commit }} -X main.date=${{ steps.meta.outputs.date }}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrypt-linux
          path: build/bin/qrypt

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Windows cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            nsis \
            upx-ucl

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Set build metadata
        id: meta
        run: |
          echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          echo "commit=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build Windows
        env:
          CC: x86_64-w64-mingw32-gcc
          CGO_ENABLED: "1"
        run: |
          wails build -platform windows/amd64 -clean \
            -ldflags "-X main.version=${{ steps.meta.outputs.version }} -X main.commit=${{ steps.meta.outputs.commit }} -X main.date=${{ steps.meta.outputs.date }}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrypt-windows
          path: build/bin/qrypt.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Set build metadata
        id: meta
        run: |
          echo "version=0.0.0-dev" >> $GITHUB_OUTPUT
          echo "commit=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Build macOS
        run: |
          wails build -platform darwin/universal -clean \
            -ldflags "-X main.version=${{ steps.meta.outputs.version }} -X main.commit=${{ steps.meta.outputs.commit }} -X main.date=${{ steps.meta.outputs.date }}"

      - name: Zip macOS app
        run: |
          cd build/bin
          zip -r qrypt-macos.zip qrypt.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrypt-macos
          path: build/bin/qrypt-macos.zip