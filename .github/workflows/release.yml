name: Release Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-linux-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Linux
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          COMMIT=${GITHUB_SHA:0:8}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          wails build -platform linux/amd64 -clean -ldflags "-X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE"

      - name: Build Windows
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          COMMIT=${GITHUB_SHA:0:8}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          wails build -platform windows/amd64 -clean -ldflags "-X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE"

      - name: Create Release & Upload Linux/Windows
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/qrypt
            build/bin/qrypt.exe
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build macOS
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          COMMIT=${GITHUB_SHA:0:8}
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          wails build -platform darwin/universal -clean -ldflags "-X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE"

      - name: Upload macOS
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/qrypt.app
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
